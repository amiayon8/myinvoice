<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Invoice Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            primary: '#6366f1',
            dark: {
              bg: '#020617', // Deeper slate
              card: '#0f172a',
              border: '#1e293b'
            }
          }
        },
      },
    }
  </script>
  <style>
    @page {
      size: A4;
      margin: 0;
    }

    @media print {
      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      body {
        background: white !important;
        color: black !important;
        overflow: visible !important;
        height: auto !important;
      }

      #root {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
        display: block !important;
      }

      .invoice-container {
        box-shadow: none !important;
        border: none !important;
        margin: 0 !important;
        width: 100% !important;
        min-height: 297mm !important;
      }

      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .dark .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #334155;
    }

    @keyframes slideIn {
      from {
        transform: translateY(10px);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .animate-slide-in {
      animation: slideIn 0.3s ease-out forwards;
    }

    body {
      transition: background-color 0.3s ease;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>

<body class="bg-slate-50 dark:bg-dark-bg overflow-hidden font-sans text-slate-900 dark:text-slate-100 antialiased">
  <div id="root" class="w-screen h-screen"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
